<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Scalable Document (SDOX) — A semantic, structured, and AI-friendly document language. Modern alternative to Markdown with deterministic parsing and modular architecture." />
		<meta name="keywords" content="SDOX, Scalable Document, document language, markdown alternative, semantic markup, AI-friendly, structured documents" />
		<meta name="author" content="SDOX Team" />
		<meta name="theme-color" content="#0a0e17" />

		<!-- Open Graph -->
		<meta property="og:title" content="SDOX — Scalable Document" />
		<meta property="og:description" content="A semantic, structured, and AI-friendly document language. Modern alternative to Markdown." />
		<meta property="og:type" content="website" />

		<!-- Google Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
